name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request for the skill-editor project (Deno + Fresh v2 + Preact).

            Focus on:
            - Code quality and Deno/TypeScript best practices
            - Fresh v2 conventions (islands architecture, file-based routing, middleware)
            - Preact Signals usage correctness
            - Tailwind CSS 4 class usage
            - Potential bugs or runtime errors
            - Security concerns
            - Performance issues

            Use inline comments for specific code issues.
            Use `gh pr comment` for overall summary feedback.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
